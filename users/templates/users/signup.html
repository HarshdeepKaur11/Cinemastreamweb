{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Cinemastream</title>
    <link rel="icon" href="{% static 'images/favicon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'users/css/auth.css' %}">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="container d-flex flex-column justify-content-center align-items-center">
        <div class="card p-4 auth-card">
            <div class="text-center mb-4">
                <h2 class="fw-bold gradient-text">Create Account</h2>
                <p class="text-white-50">Join the cinematic revolution today</p>
            </div>

            {% if messages %}
            <div class="alert-container-floating">
                {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} py-2 small mb-4">
                    <i class="bi bi-info-circle me-2"></i> {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="row gx-2 gy-1">
                    <div class="col-12 col-md-6 mb-1 mb-md-3 text-start">
                        <label class="label-small">Username</label>
                        <input type="text" name="username" class="form-control auth-input" placeholder="Username" required>
                    </div>
                    <div class="col-12 col-md-6 mb-1 mb-md-3 text-start">
                        <label class="label-small">Email Address</label>
                        <input type="email" name="email" class="form-control auth-input" placeholder="user@example.com" required>
                    </div>
                </div>

                <div class="row gx-2 gy-1">
                    <div class="col-md-6 mb-1 mb-md-3 text-start">
                        <label class="label-small">Age</label>
                        <input type="number" name="age" class="form-control auth-input" placeholder="18+" required>
                    </div>
                    <div class="col-md-6 mb-1 mb-md-3 text-start">
                        <label class="label-small">Gender</label>
                        <select name="gender" class="form-control auth-input" required>
                            <option value="" disabled selected>Select</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group mb-1 mb-md-3 text-start">
                    <label class="label-small">Password</label>
                    <div class="position-relative">
                        <input type="password" name="password" id="id_password" class="form-control auth-input" placeholder="••••••••" required>
                        <i class="bi bi-eye-slash toggle-password" id="togglePassword"></i>
                    </div>
                </div>

                <button type="submit" class="btn btn-glow w-100 rounded-pill fw-bold py-2 mb-3">
                    Sign Up
                </button>
            </form>

            <p class="text-center mt-3 text-white-50 text-small">
                Already have an account? <a href="{% url 'users:login' %}" class="text-info text-decoration-none">Log in here</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#id_password');

        togglePassword?.addEventListener('click', function (e) {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });
    </script>
</body>
</html>
