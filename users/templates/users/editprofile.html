{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Identity | Cinemastream</title>
    <link rel="icon" href="{% static 'images/favicon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/sidebar.css' %}">
    <link rel="stylesheet" href="{% static 'users/css/editpro.css' %}">

</head>

<body class="text-white edit-profile-page">
    {% include 'core/includes/navbar.html' %}

    <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar();"></div>
    {% include 'core/includes/sidebar.html' %}

    <main class="main-content-wrapper" id="main-content">
        <div class="container py-3">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-10">
                    <div class="settings-card p-3 p-md-4 shadow-lg">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h4 class="mb-0 pt-4 fw-600">Edit Profile</h4>
                            <a href="{% url 'users:profile' %}" class="btn btn-outline-secondary btn-sm rounded-pill px-3 text-white border-white-10">Cancel</a>
                        </div>

                        <form method="POST" action="{% url 'users:edit_profile' %}" enctype="multipart/form-data">
                            {% csrf_token %}
                            
                            <div class="row g-3 align-items-center mb-4">
                                <div class="col-auto">
                                    <div class="profile-avatar-container">
                                        <img src="{% if current_user.profile_pic %}{{ current_user.profile_pic.url }}{% else %}https://ui-avatars.com/api/?name={{ current_user.username }}{% endif %}" 
                                             id="profileDisplay" class="profile-avatar" alt="Profile">
                                        <input type="file" name="profile_pic" id="fileInput" accept="image/*" class="d-none">
                                        <div class="edit-avatar-btn" onclick="document.getElementById('fileInput').click();">
                                            <i class="bi bi-camera-fill"></i>
                                        </div>
                                    </div>
                                </div>
                                <div class="col">
                                    <h5 class="mb-1 text-white">Update Identity</h5>
                                    <p class="text-white-50 m-0 small">Change your avatar and basic info</p>
                                </div>
                            </div>

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="label-small mb-1">Username</label>
                                    <input type="text" name="username" class="form-control auth-input py-2" value="{{ current_user.username|default:'' }}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="label-small mb-1">Email Address</label>
                                    <input type="email" name="email" class="form-control auth-input py-2" value="{{ current_user.email }}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="label-small mb-1">Age</label>
                                    <input type="number" name="age" class="form-control auth-input py-2" value="{{ current_user.age }}">
                                </div>
                                <div class="col-md-6">
                                    <label class="label-small mb-1">Gender</label>
                                    <select name="gender" class="form-select auth-input py-2">
                                        <option value="Male" {% if current_user.gender|lower == 'male' %}selected{% endif %}>Male</option>
                                        <option value="Female" {% if current_user.gender|lower == 'female' %}selected{% endif %}>Female</option>
                                        <option value="Other" {% if current_user.gender|lower == 'other' %}selected{% endif %}>Other</option>
                                    </select>
                                </div>
                                <div class="col-md-12">
                                    <label class="label-small mb-1">Bio</label>
                                    <textarea name="bio" class="form-control auth-input py-2" rows="2" placeholder="Something about you...">{{ current_user.bio }}</textarea>
                                </div>
                                <div class="col-12 mt-4">
                                    <button type="submit" class="btn btn-glow-primary w-100 py-3 mt-2">Save Changes</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    {% include 'core/includes/footer.html' %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        
        const fileInput = document.getElementById('fileInput');
        const profileDisplay = document.getElementById('profileDisplay');
        if (fileInput && profileDisplay) {
            fileInput.addEventListener('change', function (e) {
                if (e.target.files && e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (event) => { profileDisplay.src = event.target.result; }
                    reader.readAsDataURL(e.target.files[0]);
                }
            });
        }
    </script>
</body>
</html>
