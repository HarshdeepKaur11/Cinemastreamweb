{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Cinemastream</title>
    <link rel="icon" href="{% static 'images/favicon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'users/css/auth.css' %}">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="container d-flex flex-column justify-content-center align-items-center">
        <div class="card p-4 auth-card">
            <div class="text-center mb-4">
                <h2 class="fw-bold gradient-text">Verify Identity</h2>
                <p class="text-white-50">Enter the 6-digit code sent to your email and set your new password.</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} py-2 small mb-4">
                        <i class="bi bi-info-circle me-2"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group mb-3 text-start">
                    <label class="label-small">6-Digit OTP Code</label>
                    <input type="text" name="code" class="form-control auth-input text-center fs-3 fw-bold" placeholder="000000" maxlength="6" pattern="\d{6}" required autofocus>
                </div>

                <div class="form-group mb-3 text-start">
                    <label class="label-small">New Password</label>
                    <div class="position-relative">
                        <input type="password" name="password" id="id_password" class="form-control auth-input" placeholder="••••••••" minlength="8" required>
                        <i class="bi bi-eye-slash toggle-password" id="togglePassword1"></i>
                    </div>
                </div>

                <div class="form-group mb-4 text-start">
                    <label class="label-small">Confirm Password</label>
                    <div class="position-relative">
                        <input type="password" name="confirm_password" id="id_confirm_password" class="form-control auth-input" placeholder="••••••••" minlength="8" required>
                        <i class="bi bi-eye-slash toggle-password" id="togglePassword2"></i>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-glow w-100 rounded-pill fw-bold py-2 mb-3">
                    Reset Password
                </button>
            </form>

            <div class="mt-2 text-center">
                <p id="timer-text" class="text-white-50 small mb-2">Resend code in <b id="timer" class="timer-b">50</b>s</p>
                <a href="{% url 'users:resend_reset_otp' %}" id="resend-link" class="text-info text-decoration-none fw-bold d-none">Resend Code</a>
            </div>

            <p class="text-center mt-3 text-white-50 text-small">
                Back to <a href="{% url 'users:login' %}" class="text-info text-decoration-none">Login</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        
        let timeLeft = 50;
        const timerLabel = document.getElementById('timer');
        const resendLink = document.getElementById('resend-link');
        const timerText = document.getElementById('timer-text');

        const countdown = setInterval(() => {
            timeLeft--;
            if (timerLabel) timerLabel.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                if (resendLink) resendLink.classList.remove('d-none');
                if (timerText) timerText.classList.add('d-none');
                
                
                const otpInput = document.querySelector('input[name="code"]');
                if (otpInput) {
                    otpInput.value = '';
                    otpInput.disabled = true;
                    otpInput.placeholder = 'Expired';
                }
            }
        }, 1000);

        function setupPasswordToggle(toggleId, inputId) {
            const toggle = document.querySelector(toggleId);
            const input = document.querySelector(inputId);
            toggle?.addEventListener('click', function() {
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                this.classList.toggle('bi-eye');
                this.classList.toggle('bi-eye-slash');
            });
        }
        setupPasswordToggle('#togglePassword1', '#id_password');
        setupPasswordToggle('#togglePassword2', '#id_confirm_password');

        
        document.querySelector('form').addEventListener('submit', function(e) {
            const pw = document.querySelector('#id_password').value;
            const confirmPw = document.querySelector('#id_confirm_password').value;
            if (pw !== confirmPw) {
                e.preventDefault();
                alert('Passwords do not match!');
            }
        });
    </script>
</body>
</html>
