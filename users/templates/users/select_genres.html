{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinemastream - Select Genres</title>
    <link rel="icon" href="{% static 'images/favicon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'users/css/auth.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
    <link rel="stylesheet" href="{% static 'users/css/genres.css' %}">
</head>
<body class="genre-selection-page">

    <div class="container py-5" style="max-width: 900px;">
        <div class="text-center mb-5">
            <h1 class="fw-bold gradient-text">What do you like?</h1>
            <p class="text-white-50">Select your favorite genres to help our AI recommend the best movies for you.</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="row g-3">
                {% for genre in genres %}
                <div class="col-6 col-md-3">
                    <label class="genre-card" id="label-{{ genre.genre_id }}">
                        <input type="checkbox" name="genres" value="{{ genre.genre_id }}" class="hidden-check" onchange="toggleSelected(this, '{{ genre.genre_id }}')">
                        <i class="bi bi-stars text-primary"></i>
                        <span class="fw-bold">{{ genre.genre_name }}</span>
                    </label>
                </div>
                {% empty %}
                <div class="col-12 text-center py-5">
                    <p class="text-secondary">No genres found. You can add them in the admin panel.</p>
                </div>
                {% endfor %}
            </div>

            <div class="text-center mt-5">
                <button type="submit" class="btn btn-primary btn-lg px-5 rounded-pill fw-bold shadow-lg">
                    Perfect, Let's Start! <i class="bi bi-arrow-right ms-2"></i>
                </button>
            </div>
        </form>
    </div>

    <script>
        function toggleSelected(checkbox, id) {
            const card = document.getElementById('label-' + id);
            if (checkbox.checked) {
                card.classList.add('selected');
            } else {
                card.classList.remove('selected');
            }
        }
    </script>
</body>
</html>
