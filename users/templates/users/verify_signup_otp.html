{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Registration | CinemaStream</title>
    <link rel="icon" href="{% static 'images/favicon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'users/css/auth.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/otp.css' %}">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="container d-flex flex-column justify-content-center align-items-center min-vh-100">
        <div class="card p-4 auth-card">
            <div class="text-center mb-4">
                <div class="mx-auto mb-3 d-flex align-items-center justify-content-center otp-icon-wrapper rounded-circle">
                    <i class="bi bi-envelope-check fs-2"></i>
                </div>
                <h2 class="fw-bold gradient-text">Verify Email</h2>
                <p class="text-white-50 small">Enter the 6-digit code sent to<br><b class="text-info">{{ email }}</b></p>
            </div>

            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} py-2 small mb-4">
                    <i class="bi bi-info-circle me-2"></i> {{ message }}
                </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group mb-4 text-center">
                    <label class="label-small text-start">6-Digit Verification Code</label>
                    <input type="text" name="otp" class="form-control auth-input text-center otp-input-field" 
                           placeholder="000000" maxlength="6" pattern="\d{6}" required autofocus>
                </div>
                
                <button type="submit" class="btn btn-glow w-100 rounded-pill fw-bold py-2 mb-3">
                    Verify & Register
                </button>
            </form>

            <div class="text-center mt-3 pt-3 border-top border-white-10">
                <p id="timer-text" class="text-white-50 small mb-2">Resend code in <b id="timer" class="timer-b">50</b>s</p>
                <a href="{% url 'users:resend_signup_otp' %}" id="resend-link" class="text-info text-decoration-none fw-bold d-none resend-link">Resend OTP</a>
                
                <p class="text-white-50 mt-3 mb-0 text-small">
                    Wrong email? <a href="{% url 'users:signup' %}" class="text-info text-decoration-none">Change it</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        
        let timeLeft = 50;
        const timerLabel = document.getElementById('timer');
        const timerText = document.getElementById('timer-text');
        const resendLink = document.getElementById('resend-link');

        const countdown = setInterval(() => {
            timeLeft--;
            if (timerLabel) timerLabel.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                if (timerText) timerText.classList.add('d-none');
                if (resendLink) resendLink.classList.remove('d-none');
            }
        }, 1000);
    </script>
</body>
</html>
