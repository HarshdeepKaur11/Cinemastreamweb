{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Cinemastream</title>
    <link rel="icon" href="{% static 'images/favicon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'users/css/auth.css' %}">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="container d-flex flex-column justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="card p-4 auth-card">
            <div class="text-center mb-4">
                <h2 class="fw-bold gradient-text">Update Security</h2>
                <p class="text-white-50">Choose a strong password to protect your account</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} py-2 small mb-4">
                        <i class="bi bi-info-circle me-2"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group mb-3 text-start">
                    <label class="label-small">Current Password</label>
                    <div class="position-relative">
                        <input type="password" name="current_password" id="id_current_password" class="form-control auth-input" placeholder="••••••••" required>
                        <i class="bi bi-eye-slash toggle-password" onclick="togglePass('id_current_password', this)"></i>
                    </div>
                </div>

                <div class="form-group mb-3 text-start">
                    <label class="label-small">New Password</label>
                    <div class="position-relative">
                        <input type="password" name="new_password" id="id_new_password" class="form-control auth-input" placeholder="••••••••" minlength="8" required>
                        <i class="bi bi-eye-slash toggle-password" onclick="togglePass('id_new_password', this)"></i>
                    </div>
                </div>

                <div class="form-group mb-4 text-start">
                    <label class="label-small">Confirm New Password</label>
                    <div class="position-relative">
                        <input type="password" name="confirm_password" id="id_confirm_password" class="form-control auth-input" placeholder="••••••••" minlength="8" required>
                        <i class="bi bi-eye-slash toggle-password" onclick="togglePass('id_confirm_password', this)"></i>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-glow w-100 rounded-pill fw-bold py-2 mb-3">
                    Update Password
                </button>
            </form>

            <p class="text-center mt-3 text-white-50 text-small">
                Changed your mind? <a href="{% url 'users:profile' %}" class="text-info text-decoration-none">Go Back</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePass(inputId, el) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                el.classList.replace('bi-eye-slash', 'bi-eye');
            } else {
                input.type = 'password';
                el.classList.replace('bi-eye', 'bi-eye-slash');
            }
        }
    </script>
</body>
</html>
