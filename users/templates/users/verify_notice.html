{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Email - CinemaStream</title>
    <link rel="icon" href="{% static 'images/favicon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'users/css/notice.css' %}">
</head>
<body class="notice-page-body">
    <div class="glass-card">
        <div class="icon-box">
            <i class="bi bi-envelope-check"></i>
        </div>
        <h2 class="fw-800 mb-3">Verify Your Email</h2>
        <p class="text-white-50 mb-4">
            We've sent a verification link to <br>
            <span class="email-highlight">{{ email }}</span>.
        </p>
        <p class="small text-white-50">
            Please check your inbox (and spam folder) and click the link to activate your account.
        </p>
        <a href="{% url 'users:login' %}" class="btn-verify">Back to Login</a>
    </div>
</body>
</html>
