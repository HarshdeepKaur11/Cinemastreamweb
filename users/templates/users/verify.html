{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Identity - Cinemastream</title>
    <link rel="icon" href="{% static 'images/favicon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'users/css/auth.css' %}">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="container d-flex flex-column justify-content-center align-items-center">
        <div class="card p-4 auth-card">
            <div class="text-center mb-4">
                <h2 class="fw-bold gradient-text">Verify OTP</h2>
                <p class="text-white-50">Enter the 6-digit code sent to your email</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} py-2 small mb-4">
                        <i class="bi bi-info-circle me-2"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group mb-4">
                    <input type="text" name="otp" class="form-control auth-input text-center fs-2 letter-spacing-3" 
                           placeholder="000000" maxlength="6" pattern="\d{6}" required autofocus>
                </div>
                
                <button type="submit" class="btn btn-glow w-100 rounded-pill fw-bold py-2 mb-3">
                    Verify Now
                </button>
            </form>

            <div class="mt-4 text-center">
                <p class="x-small text-white-50 mb-0">Didn't get the code? 
                    <a href="{% url 'users:forgot_password' %}" class="text-info text-decoration-none fw-bold">Resend OTP</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
