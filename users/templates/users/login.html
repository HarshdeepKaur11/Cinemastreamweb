{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cinemastream</title>
    <link rel="icon" href="{% static 'images/favicon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'users/css/auth.css' %}">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="container d-flex flex-column justify-content-center align-items-center">
        <div class="card p-4 auth-card">
            <div class="text-center mb-4">
                <h2 class="fw-bold gradient-text">Welcome Back</h2>
                <p class="text-white-50">Log in to continue your cinematic journey</p>
            </div>

            {% if messages %}
            <div class="alert-container-floating">
                {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} py-2 small mb-4">
                    <i class="bi bi-info-circle me-2"></i> {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group mb-3 text-start">
                    <label class="label-small">Username or Email</label>
                    <input type="text" name="identifier" class="form-control auth-input" placeholder="Username or user@mail.com" required autofocus>
                </div>
                
                <div class="form-group mb-4 text-start">
                    <label class="label-small">Password</label>
                    <div class="position-relative">
                        <input type="password" name="password" id="id_password" class="form-control auth-input" placeholder="••••••••" required>
                        <i class="bi bi-eye-slash toggle-password" id="togglePassword"></i>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label text-white-50 small" for="remember">Remember me</label>
                    </div>
                    <a href="{% url 'users:forgot_password' %}" class="text-info text-decoration-none small">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-glow w-100 rounded-pill fw-bold py-2 mb-3">
                    Log In
                </button>
            </form>

            <p class="text-center mt-3 text-white-50 text-small">
                Don't have an account? <a href="{% url 'users:signup' %}" class="text-info text-decoration-none">Sign up here</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#id_password');

        togglePassword.addEventListener('click', function (e) {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });
    </script>
</body>
</html>
