{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Cinemastream</title>
    <link rel="icon" href="{% static 'images/favicon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'users/css/auth.css' %}">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="container d-flex flex-column justify-content-center align-items-center">
        <div class="card p-4 auth-card">
            <div class="text-center mb-4">
                <h2 class="fw-bold gradient-text">Recover Account</h2>
                <p class="text-white-50">Enter your email to receive an OTP</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} py-2 small mb-4">
                        <i class="bi bi-info-circle me-2"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group mb-4 text-start">
                    <label class="label-small">Email Address</label>
                    <input type="email" name="email" class="form-control auth-input" placeholder="user@example.com" required>
                </div>
                
                <button type="submit" class="btn btn-glow w-100 rounded-pill fw-bold py-2">
                    Send OTP
                </button>
            </form>

            <p class="text-center mt-4 text-white-50 text-small">
                Remembered? <a href="{% url 'users:login' %}" class="text-info text-decoration-none">Back to Login</a>
            </p>
        </div>
    </div>
</body>
</html>
