{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Factor Auth - Cinemastream</title>
    <link rel="icon" href="{% static 'images/favicon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'users/css/auth.css' %}">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="container d-flex flex-column justify-content-center align-items-center">
        <div class="card p-4 auth-card text-center">
            <div class="mb-4">
                <h2 class="fw-bold gradient-text">OTP</h2>
                <p class="text-white-50">Please enter the short code sent to your email.</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} py-2 small mb-4">
                        <i class="bi bi-info-circle me-2"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group mb-4">
                    <input type="text" name="code" class="form-control auth-input text-center fs-2 letter-spacing-3" 
                           placeholder="0000" maxlength="4" pattern="\d{4}" required autofocus>
                </div>
                
                <button type="submit" class="btn btn-glow w-100 rounded-pill fw-bold py-2 mb-3">
                    Verify Code
                </button>
            </form>

            <div class="mt-4">
                <p id="timer-text" class="text-white-50 small mb-2">Resend code in <b id="timer" class="timer-b">50</b>s</p>
                <a href="{% url 'users:resend_2fa_otp' %}" id="resend-link" class="text-info text-decoration-none fw-bold d-none">Resend Code</a>
            </div>

            <p class="text-center mt-3 text-white-50 text-small">
                Back to <a href="{% url 'users:login' %}" class="text-info text-decoration-none">Login</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        
        let timeLeft = 50;
        const timerLabel = document.getElementById('timer');
        const resendLink = document.getElementById('resend-link');

        const countdown = setInterval(() => {
            timeLeft--;
            if (timerLabel) timerLabel.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                if (resendLink) resendLink.classList.remove('d-none');
                const timerText = document.getElementById('timer-text');
                if (timerText) timerText.classList.add('d-none');
                
                
                const codeInput = document.querySelector('input[name="code"]');
                if (codeInput) {
                    codeInput.value = '';
                    codeInput.disabled = true;
                    codeInput.placeholder = '';
                }
            }
        }, 1000);
    </script>

</body>
</html>
