{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access - Cinemastream</title>
    <link rel="icon" href="{% static 'images/favicon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'users/css/auth.css' %}">
    <style>
        body {
            
            background: radial-gradient(circle at top right, #05081a, #010208) !important;
        }
        .auth-card {
            background: rgba(5, 5, 20, 0.6) !important; 
            animation: fadeIn 0.4s ease-out !important; 
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>

<body>
    <div class="bg-blobs">
        <div class="blob" style="background: linear-gradient(45deg, rgba(30, 0, 80, 0.2), rgba(10, 10, 60, 0.2));"></div>
        <div class="blob" style="background: linear-gradient(45deg, rgba(20, 20, 100, 0.2), rgba(0, 0, 40, 0.2));"></div>
    </div>

    <div class="container d-flex flex-column justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="card p-4 auth-card">
            <div class="text-center mb-4">
                <div class="mb-2"><i class="bi bi-shield-lock-fill text-primary opacity-50 fs-1"></i></div>
                <h2 class="fw-bold gradient-text">Admin Portal</h2>
                <p class="text-white-50">Authorized Personnel Only</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} py-2 small mb-4">
                        <i class="bi bi-info-circle me-2"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'admin_panel:admin_login' %}">
                {% csrf_token %}
                <div class="form-group mb-3 text-start">
                    <label class="label-small">Admin Identifier (Username or Email)</label>
                    <input type="text" name="email" class="form-control auth-input" placeholder="Admin username/email" required autofocus>
                </div>
                
                <div class="form-group mb-4 text-start">
                    <label class="label-small">Secure Password</label>
                    <div class="position-relative">
                        <input type="password" name="password" id="passwordInput" class="form-control auth-input" placeholder="••••••••" required>
                        <i class="bi bi-eye-slash toggle-password" id="togglePassword"></i>
                    </div>
                </div>

                <button type="submit" class="btn btn-glow w-100 rounded-pill fw-bold py-2 mb-3">
                    Enter Dashboard
                </button>
            </form>

            <div class="text-center mt-3">
                <a href="{% url 'core:index' %}" class="text-white-50 text-decoration-none small">
                    <i class="bi bi-arrow-left me-1"></i> Back to Site
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#passwordInput');

        togglePassword.addEventListener('click', function () {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });

        
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                const alerts = document.querySelectorAll('.alert');
                alerts.forEach(function(alert) {
                    const bsAlert = new bootstrap.Alert(alert);
                    bsAlert.close();
                });
            }, 2000);
        });
    </script>
</body>
</html>
