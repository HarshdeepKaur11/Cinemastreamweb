<div class="mt-3 mt-md-5 animate-fade-in" id="unlockedRelatedContent">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4">
        <h4 class="fw-bold text-white mb-1 text-uppercase letter-spacing-1">Related Movies</h4>
        <span class="text-white-50 small">Precision-matched for you</span>
    </div>
    
    <div class="related-scroll-container d-flex gap-3 overflow-auto pb-4" style="scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent;">
        {% for related in related_movies %}
            <a href="{% url 'dashboard:moviedetails' related.movie_id %}" class="related-card flex-shrink-0 text-decoration-none" style="width: 150px; min-width: 140px;">
                <div class="position-relative overflow-hidden rounded-3 shadow-sm border border-white-10 hover-lift h-100">
                    <div style="aspect-ratio: 2/3; position: relative; overflow: hidden;">
                        <img src="{{ related.poster_url }}" class="img-fluid w-100 h-100" alt="{{ related.title }}" style="object-fit: cover;">
                        <div class="card-overlay-mini p-2 d-flex flex-column justify-content-end" style="position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);">
                            <div class="movie-card-genres text-white-50 xx-small mt-1">{{ related.get_primary_genre }}</div>
                            <div class="d-flex justify-content-between align-items-center mt-1">
                                <span class="match-badge-mini" style="font-size: 0.55rem; background: rgba(0,255,0,0.2); color: #00ff00; padding: 1px 4px; border-radius: 3px;">{{ related.match_percentage }}% Match</span>
                                <span class="text-white-50" style="font-size: 0.55rem;">{{ related.release_year }}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </a>
        {% empty %}
            <div class="w-100 text-center py-4 text-white-50">
                <p>No similar movies found yet.</p>
            </div>
        {% endfor %}
    </div>
</div>
